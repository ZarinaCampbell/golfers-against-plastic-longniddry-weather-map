<!DOCTYPE html>
<html lang="en">
<head>
    <title>Golfers Against Plastic: Wind Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        #map { height: 600px; }

        /* Wind Arrow Styles */
        .wind-arrow {
            width: 30px;
            height: 30px;
            background-size: contain;
            background-repeat: no-repeat;
        }

        /* Compass image in the top-right corner */
        #compass {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 50px;
            height: 50px;
        }

        /* Custom cursor as golfer image */
        body {
            cursor: url('/static/golfer-cursor.png'), auto;
        }
    </style>
</head>
<body>
    <h1>Golfers Against Plastic: Wind Map</h1>
    <div id="map"></div>

    <!-- Compass Image -->
    <img id="compass" src="/static/compass.png" alt="Compass">

    <!-- Leaflet.js for map functionality -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>
        // Initialize the map
        var map = L.map('map').setView([55.9986, -2.8584], 15);

        // Add OpenStreetMap tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
        }).addTo(map);

        // Function to add a wind direction arrow (rotating)
        function addWindArrow(lat, lng, windDirection) {
            var arrowIcon = L.divIcon({
                className: 'wind-arrow',
                html: '<div style="transform: rotate(' + windDirection + 'deg); width: 30px; height: 30px; background: url(\'/static/arrow-icon.png\') no-repeat center center; background-size: contain;"></div>',
                iconSize: [30, 30]  // Set the size of the arrow marker
            });

            // Add the wind direction arrow at the specified coordinates
            L.marker([lat, lng], { icon: arrowIcon }).addTo(map);
        }

        // Add click event to the map
        map.on('click', function(e) {
            var lat = e.latlng.lat;
            var lng = e.latlng.lng;

            // Call the Flask /wind endpoint with clicked coordinates
            fetch(`/wind?lat=${lat}&lng=${lng}`)
                .then(response => response.json())
                .then(data => {
                    // Extract wind direction from the API response
                    var windDirection = data.direction;  // Wind direction in degrees
                    var windInfo = `Speed: ${data.speed} mph\nDirection: ${data.direction}° (${data.direction_text})\nGusts: ${data.gusts}`;

                    // Display wind information in a popup
                    L.popup()
                        .setLatLng(e.latlng)
                        .setContent(windInfo)
                        .openOn(map);

                    // Add wind direction arrow (rotating marker) based on the direction
                    addWindArrow(lat, lng, windDirection);
                });
        });
    </script>
</body>
</html>
