<!DOCTYPE html>
<html lang="en">
<head>
    <title>Golfers Against Plastic: Wind Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        /* Full page styles */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Title Styling */
        h1 {
            margin-top: 20px; /* Move title down slightly */
            text-align: center; /* Keep title centered */
        }

        /* Map styles */
        #map {
            height: 600px;
            position: relative; /* Needed for absolute positioning of compass */
        }

        /* Wind Arrow Styles */
        .wind-arrow {
            width: 30px;
            height: 30px;
            background-size: contain;
            background-repeat: no-repeat;
        }

        /* Compass image in the top-left corner of the map */
        #compass {
            position: absolute; /* Place relative to map */
            top: 10px; /* 10px from top */
            left: 10px; /* 10px from left */
            width: 100px;
            height: 100px;
        }

        /* Custom cursor as golfer image */
        body {
            cursor: url('/static/golfer-cursor.png'), auto;
        }

        /* Reset button styles */
        #reset-button {
            position: absolute; /* Position relative to map */
            bottom: 10px; /* 10px from the bottom of the map */
            right: 10px; /* 10px from the right of the map */
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        #reset-button:hover {
            background-color: #45a049;
        }

        /* Mobile Responsiveness */
        @media screen and (max-width: 600px) {
            h1 {
                font-size: 20px; /* Smaller title on mobile */
            }

            #reset-button {
                bottom: 20px; /* Move reset button further down on mobile */
                font-size: 14px; /* Smaller button text for mobile */
            }

            #compass {
                width: 80px; /* Smaller compass on mobile */
                height: 80px;
            }
        }
    </style>
</head>
<body>
    <h1>Golfers Against Plastic: Wind Map</h1>
    <div id="map"></div>

    <!-- Reset Button -->
    <button id="reset-button">Reset Map</button>

    <!-- Compass Image -->
    <img id="compass" src="/static/compass.png" alt="Compass">

    <!-- Leaflet.js for map functionality -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>
        // Initialize the map
        var map = L.map('map').setView([55.9986, -2.8584], 15);

        // Array to hold references to wind arrow markers
        var windArrows = [];

        // Add OpenStreetMap tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
        }).addTo(map);

        // Function to add a wind direction arrow (rotating)
        function addWindArrow(lat, lng, windDirection) {
            var arrowIcon = L.divIcon({
                className: 'wind-arrow',
                html: '<div style="transform: rotate(' + windDirection + 'deg); width: 30px; height: 30px; background: url(\'/static/arrow-icon.png\') no-repeat center center; background-size: contain;"></div>',
                iconSize: [30, 30]  // Set the size of the arrow marker
            });

            // Create the wind direction arrow marker and add it to the map
            var arrowMarker = L.marker([lat, lng], { icon: arrowIcon }).addTo(map);

            // Store the arrow marker for later removal
            windArrows.push(arrowMarker);
        }

        // Add click event to the map
        map.on('click', function(e) {
            var lat = e.latlng.lat;
            var lng = e.latlng.lng;

            // Call the Flask /wind endpoint with clicked coordinates
            fetch(`/wind?lat=${lat}&lng=${lng}`)
                .then(response => response.json())
                .then(data => {
                    // Extract wind direction from the API response
                    var windDirection = data.direction;  // Wind direction in degrees
                    var windInfo = `Speed: ${data.speed} mph\nDirection: ${data.direction}° (${data.direction_text})\nGusts: ${data.gusts}`;

                    // Display wind information in a popup with offset (popup will appear above the click point)
                    L.popup({
                        offset: L.point(0, -30)  // Move the popup 30px above the clicked position
                    })
                    .setLatLng(e.latlng)
                    .setContent(windInfo)
                    .openOn(map);

                    // Add wind direction arrow (rotating marker) based on the direction
                    addWindArrow(lat, lng, windDirection);
                });
        });

        // Reset Map Function
        document.getElementById('reset-button').onclick = function() {
            // Reset to the initial coordinates and zoom level
            map.setView([55.9986, -2.8584], 15);

            // Remove all wind arrows from the map
            windArrows.forEach(function(marker) {
                map.removeLayer(marker);
            });

            // Clear the windArrows array
            windArrows = [];
        };
    </script>
</body>
</html>
